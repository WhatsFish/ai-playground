# Nginx snippet for ai-playground. Append the include to the personal-site
# server block:  include snippets/ai-playground.conf;

location /chat/ {
    proxy_pass http://127.0.0.1:3001/chat/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE streaming — disable buffering and bump timeouts.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    # Auth.js uses cookies; let them through unchanged.
    proxy_set_header Cookie $http_cookie;
}
